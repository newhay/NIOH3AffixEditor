name: Build NIOH3AffixEditor

on: [workflow_dispatch]  # 手动触发（可在 Actions 页运行），或改为 [push] 自动触发

jobs:
  build:
    runs-on: windows-latest  # 使用 Windows 虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild (for Visual C++ tools)
      uses: microsoft/setup-msbuild@v2

    - name: Install CMake
      uses: lukka/get-cmake@v3.29.3

    - name: Build C++ DLL
      shell: pwsh  # 使用 PowerShell 以兼容 bat 脚本
      run: |
        cd Nioh3AffixCore
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --build . --config Release
        cd ../..
        # 复制 DLL 到 .NET 输出目录（调整为实际输出路径：根目录的 bin/Release）
        mkdir -p bin/Test/net9.0-windows/win-x64
        copy bin/Release/Nioh3AffixCore.dll bin/Test/net9.0-windows/win-x64/

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'  # 支持 net9.0-windows

    - name: Restore dependencies
      run: dotnet restore Nioh3AffixEditor.csproj

    - name: Build project
      run: dotnet build Nioh3AffixEditor.csproj -c Test --no-restore

    - name: Publish as self-contained exe
      run: dotnet publish Nioh3AffixEditor.csproj -c Test -o publish-test -r win-x64 --self-contained true --no-build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NIOH3AffixEditor-exe
        path: publish-test/  # 上传整个发布文件夹，包括 exe 和 DLL
